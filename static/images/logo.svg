<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Main Book Shape -->
  <g transform="translate(100, 100)">
    <!-- Left page -->
    <path d="M -40 -50 L -40 50 L -5 45 L -5 -45 Z" fill="url(#grad1)" opacity="0.9">
      <animate attributeName="d" 
        values="M -40 -50 L -40 50 L -5 45 L -5 -45 Z;
                M -40 -50 L -40 50 L -5 48 L -5 -48 Z;
                M -40 -50 L -40 50 L -5 45 L -5 -45 Z"
        dur="3s" repeatCount="indefinite"/>
    </path>
    
    <!-- Right page -->
    <path d="M 5 -45 L 5 45 L 40 50 L 40 -50 Z" fill="url(#grad2)" opacity="0.9">
      <animate attributeName="d" 
        values="M 5 -45 L 5 45 L 40 50 L 40 -50 Z;
                M 5 -48 L 5 48 L 40 50 L 40 -50 Z;
                M 5 -45 L 5 45 L 40 50 L 40 -50 Z"
        dur="3s" repeatCount="indefinite"/>
    </path>
    
    <!-- Book spine -->
    <rect x="-5" y="-50" width="10" height="100" fill="#4F46E5"/>
    
    <!-- Wings (Angel motif) -->
    <!-- Left wing -->
    <g opacity="0.8">
      <path d="M -45 -15 Q -55 -20, -60 -15 Q -65 -10, -60 -5 Q -55 0, -45 -5 Z" 
            fill="url(#grad1)" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate"
          values="0 -45 -10; -5 -45 -10; 0 -45 -10"
          dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M -45 -5 Q -55 -10, -58 -5 Q -62 0, -58 5 Q -55 10, -45 5 Z" 
            fill="url(#grad1)" opacity="0.7" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate"
          values="0 -45 0; -5 -45 0; 0 -45 0"
          dur="2s" begin="0.2s" repeatCount="indefinite"/>
      </path>
      <path d="M -45 5 Q -53 0, -55 5 Q -58 10, -55 15 Q -53 20, -45 15 Z" 
            fill="url(#grad1)" opacity="0.5" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate"
          values="0 -45 10; -5 -45 10; 0 -45 10"
          dur="2s" begin="0.4s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Right wing -->
    <g opacity="0.8">
      <path d="M 45 -15 Q 55 -20, 60 -15 Q 65 -10, 60 -5 Q 55 0, 45 -5 Z" 
            fill="url(#grad2)" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate"
          values="0 45 -10; 5 45 -10; 0 45 -10"
          dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 45 -5 Q 55 -10, 58 -5 Q 62 0, 58 5 Q 55 10, 45 5 Z" 
            fill="url(#grad2)" opacity="0.7" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate"
          values="0 45 0; 5 45 0; 0 45 0"
          dur="2s" begin="0.2s" repeatCount="indefinite"/>
      </path>
      <path d="M 45 5 Q 53 0, 55 5 Q 58 10, 55 15 Q 53 20, 45 15 Z" 
            fill="url(#grad2)" opacity="0.5" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate"
          values="0 45 10; 5 45 10; 0 45 10"
          dur="2s" begin="0.4s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Star/Light above book -->
    <circle cx="0" cy="-60" r="5" fill="#FFD700" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Star rays -->
    <g opacity="0.6">
      <line x1="0" y1="-70" x2="0" y2="-75" stroke="#FFD700" stroke-width="1.5">
        <animate attributeName="y2" values="-75;-78;-75" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="-7" y1="-65" x2="-10" y2="-68" stroke="#FFD700" stroke-width="1.5">
        <animate attributeName="x2" values="-10;-12;-10" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="-68;-70;-68" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="7" y1="-65" x2="10" y2="-68" stroke="#FFD700" stroke-width="1.5">
        <animate attributeName="x2" values="10;12;10" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="-68;-70;-68" dur="2s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="30" cy="30" r="3" fill="url(#grad1)" opacity="0.3">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="170" r="4" fill="url(#grad2)" opacity="0.3">
    <animate attributeName="r" values="4;6;4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="30" r="2" fill="#FFD700" opacity="0.4">
    <animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>