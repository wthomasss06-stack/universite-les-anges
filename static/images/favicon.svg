<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#fav-grad)"/>
  
  <!-- Book icon simplified -->
  <g transform="translate(16, 16)">
    <!-- Left page -->
    <path d="M -6 -8 L -6 8 L -1 7 L -1 -7 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Right page -->
    <path d="M 1 -7 L 1 7 L 6 8 L 6 -8 Z" fill="#ffffff" opacity="0.7"/>
    
    <!-- Spine -->
    <rect x="-1" y="-8" width="2" height="16" fill="#ffffff"/>
    
    <!-- Star on top -->
    <circle cx="0" cy="-10" r="1.5" fill="#FFD700"/>
  </g>
</svg>